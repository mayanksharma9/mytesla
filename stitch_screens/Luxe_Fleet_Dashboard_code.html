<body class="bg-surface text-on-surface min-h-screen pb-32">

<header class="fixed top-0 w-full z-50 bg-slate-50/80 dark:bg-slate-900/80 backdrop-blur-xl shadow-sm dark:shadow-none flex items-center justify-between px-6 py-4">
<div class="flex items-center gap-4">
<button class="text-slate-700 dark:text-slate-300 hover:opacity-70 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="menu">menu</span>

<h1 class="text-slate-900 dark:text-slate-100 font-bold tracking-tighter headline-font text-lg">Luxe Mobility</h1>

<div class="flex items-center gap-4">

<main class="pt-24 px-6 md:px-12 max-w-7xl mx-auto">

<section class="mb-12">
<div class="flex items-center gap-8 overflow-x-auto pb-4 no-scrollbar">

<div class="flex flex-col items-start min-w-max opacity-30 hover:opacity-100 transition-opacity cursor-pointer">

</div>
<div class="flex flex-col items-start min-w-max opacity-30 hover:opacity-100 transition-opacity cursor-pointer">
<span class="text-on-surface-variant font-semibold headline-font text-2xl tracking-tight">Cyber Truck</span>
<span class="w-2 h-2 rounded-full bg-transparent mt-1"></span>
</div>
</div>
</section>

<p class="text-on-surface-variant text-[11px] font-bold uppercase tracking-widest mb-1">Battery</p>

<span class="text-4xl font-extrabold headline-font text-on-surface leading-none">85</span>
<span class="text-xl font-bold headline-font text-on-surface/60 leading-none mb-1">%</span>
</div>
</div>

<div class="flex items-end gap-1">
<span class="text-4xl font-extrabold headline-font text-on-surface leading-none">342</span>
<span class="text-xl font-bold headline-font text-on-surface/60 leading-none mb-1">mi</span>
</div>
</div>
</div>

<div class="w-3 h-3 rounded-full bg-tertiary"></div>

</div>
<span class="text-[11px] font-bold text-on-background uppercase tracking-widest">System Ready</span>

<span class="material-symbols-outlined text-primary text-3xl group-active:scale-90 transition-transform" data-icon="lock_open">lock_open</span>
<div class="text-left">
<p class="text-on-surface font-bold headline-font text-lg">Doors</p>
<p class="text-on-surface-variant text-sm">Unlocked</p>
</div>
</button>
<button class="group bg-surface-container-lowest p-8 rounded-lg transition-all duration-300 hover:bg-surface-bright flex flex-col justify-between aspect-square">
<span class="material-symbols-outlined text-primary text-3xl group-active:scale-90 transition-transform" data-icon="thermostat">thermostat</span>
<div class="text-left">
<p class="text-on-surface font-bold headline-font text-lg">Climate</p>

<button class="group bg-surface-container-lowest p-8 rounded-lg transition-all duration-300 hover:bg-surface-bright flex flex-col justify-between aspect-square">

<div class="text-left">
<p class="text-on-surface font-bold headline-font text-lg">Frunk</p>
<p class="text-on-surface-variant text-sm">Closed</p>
</div>
</button>
<button class="group bg-surface-container-lowest p-8 rounded-lg transition-all duration-300 hover:bg-surface-bright flex flex-col justify-between aspect-square">
<span class="material-symbols-outlined text-primary text-3xl group-active:scale-90 transition-transform" data-icon="flashlight_on">flashlight_on</span>
<div class="text-left">
<p class="text-on-surface font-bold headline-font text-lg">Flash</p>
<p class="text-on-surface-variant text-sm">Lights Off</p>
</div>
</button>
</div>
<!-- Vertical Secondary Data -->
<div class="lg:col-span-2 space-y-4">

<span class="text-2xl font-extrabold headline-font">12,402</span>

</div>
</div>

<button class="bg-white/10 p-3 rounded-full">
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>

</div>

<!-- Active Tab: Status -->
<button class="flex flex-col items-center justify-center bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-white rounded-full px-5 py-2 transition-all duration-300 group">
<span class="material-symbols-outlined text-[20px]" data-icon="electric_car" style="font-variation-settings: 'FILL' 1;">electric_car</span>

<span class="material-symbols-outlined text-[20px]" data-icon="thermostat">thermostat</span>
